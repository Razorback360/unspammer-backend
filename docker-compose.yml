version: '3.8'
services:
  fastapi:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      FIREBASE_SERVICE_ACCOUNT: /secrets/service-account.json
    volumes:
      - ./service-account.json:/secrets/service-account.json:ro
    depends_on:
      - db
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - '5432:5432'
